<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态单词卡片</title>
    <script src="./vue.global.js"></script>
    <style>
        .title-bar {
            -webkit-app-region: drag; /* 使整个标题栏可拖动 */
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            background-color: rgba(245, 245, 245, 0.9);
            border-radius: 4px;
            margin: -10px -10px 0 -10px; /* 扩展到边缘 */
        }
        .title-text {
            font-size: 14px;
            color: #333;
        }
        .close-btn {
            -webkit-app-region: no-drag; /* 确保按钮可点击 */
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 16px;
            color: #666;
            transition: all 0.2s ease;
        }
        .word-card {
            width: 300px;
            height: 220px;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
        }

        .word-header {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            background-color: #f9f9f9;
            position: relative;
        }

        .word-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .word-title h2 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        .pronunciation {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .phonetic-line {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .phonetic-label {
            font-size: 12px;
            color: #666;
            flex-shrink: 0;
        }

        .phonetic {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            flex: 1;
        }

        .audio-btn {
            flex-shrink: 0;
            background: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 2px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #666;
        }

        .audio-btn:hover {
            background-color: #f0f0f0;
        }

        .audio-btn svg {
            display: block;
        }

        .translations {
            font-size: 14px;
            color: #444;
        }

        .tran-item {
            display: inline-block;
            margin-right: 8px;
        }

        .pos {
            color: #888;
            font-style: italic;
            font-size: 0.9em;
        }

        .word-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .section {
            margin: 10px 0;
        }

        .section-title {
            font-size: 14px;
            color: #555;
            margin: 8px 0 6px 0;
            font-weight: 600;
        }

        .phrase-list, .sentence-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .phrase-item, .sentence-item {
            margin-bottom: 8px;
            font-size: 13px;
        }

        .phrase-en {
            font-weight: 500;
            color: #333;
            margin-right: 6px;
        }

        .phrase-cn {
            color: #666;
        }

        .rel-word-item, .synonym-item {
            margin-bottom: 6px;
            font-size: 13px;
        }

        .hwd {
            font-weight: 500;
            color: #333;
        }

        .tran, .syn-tran {
            color: #666;
        }

        .sentence-en {
            color: #333;
            margin-bottom: 2px;
        }

        .sentence-cn {
            color: #666;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px 0;
            font-size: 14px;
        }

        /* 倒计时样式 */
        .countdown-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .countdown {
            font-size: 12px;
            color: #888;
        }

        .update-btn {
            background: #4a8cff;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .update-btn:hover {
            background: #3a7cdf;
        }

        /* 滚动条样式 */
        .word-content::-webkit-scrollbar {
            width: 4px;
        }

        .word-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .word-content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .word-content::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="title-bar">
            <span class="title-text">单词学习</span>
            <span class="close-btn" onclick="window.close()">×</span>
        </div>
        <word-card :word="currentWord" :countdown="countdown" @update-word="updateWord"></word-card>
    </div>
</div>

<script>
    const { createApp, computed } = Vue;

    const WordCard = {
        props: {
            word: {
                type: Object,
                required: true,
                default: () => ({})
            },
            countdown: {
                type: Number,
                default: 0
            }
        },
        emits: ['update-word'],
        template: `
        <div class="word-card">
          <!-- 单词标题区域 -->
          <div class="word-header">
            <div class="word-title">
              <h2>{{ word.word }}</h2>
              <div class="pronunciation">
                <div class="phonetic-line" v-if="word.ukphone || word.ukspeech">
                  <span class="phonetic-label">UK:</span>
                  <span class="phonetic">/{{ word.ukphone }}/</span>
                  <button v-if="word.ukspeech" @click="playAudio(word.ukspeech)" class="audio-btn" title="播放英式发音">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                      <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"></path>
                      <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                    </svg>
                  </button>
                </div>
                <div class="phonetic-line" v-if="word.usphone || word.usspeech">
                  <span class="phonetic-label">US:</span>
                  <span class="phonetic">/{{ word.usphone }}/</span>
                  <button v-if="word.usspeech" @click="playAudio(word.usspeech)" class="audio-btn" title="播放美式发音">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                      <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"></path>
                      <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <div v-if="hasTranslations" class="translations">
              <span v-for="(tran, index) in word.translations" :key="index" class="tran-item">
                <span v-if="tran.pos" class="pos">{{ tran.pos }}.</span>
                {{ tran.tran_cn }}
              </span>
            </div>

            <div class="countdown-container">
              <button @click="$emit('update-word')" class="update-btn">立即更新</button>
              <div class="countdown" v-if="countdown > 0">
                下次更新: {{ countdown }}秒
              </div>
            </div>
          </div>

          <!-- 主要内容区域，使用滚动条 -->
          <div class="word-content">
            <!-- 短语部分 -->
            <div v-if="hasPhrases" class="section">
              <h3 class="section-title">常用短语</h3>
              <ul class="phrase-list">
                <li v-for="(phrase, index) in word.phrases" :key="index" class="phrase-item">
                  <span class="phrase-en">{{ phrase.p_content }}</span>
                  <span class="phrase-cn">{{ phrase.p_cn }}</span>
                </li>
              </ul>
            </div>

            <!-- 相关词部分 -->
            <div v-if="hasRelWords" class="section">
              <h3 class="section-title">相关词汇</h3>
              <div v-for="(relWord, index) in word.relWords" :key="index" class="rel-word-item">
                <span class="pos">{{ relWord.Pos }}.</span>
                <span v-for="(hwd, hIndex) in relWord.Hwds" :key="hIndex" class="hwd">
                  {{ hwd.hwd }} <span class="tran">{{ hwd.tran }}</span>
                  <span v-if="hIndex < relWord.Hwds.length - 1">; </span>
                </span>
              </div>
            </div>

            <!-- 同义词部分 -->
            <div v-if="hasSynonyms" class="section">
              <h3 class="section-title">同义词</h3>
              <div v-for="(synonym, index) in word.synonyms" :key="index" class="synonym-item">
                <span class="pos">{{ synonym.pos }}.</span>
                <span v-for="(word, wIndex) in synonym.Hwds" :key="wIndex" class="syn-word">
                  {{ word.word }}
                  <span v-if="wIndex < synonym.Hwds.length - 1">, </span>
                </span>
                <span class="syn-tran">{{ synonym.tran }}</span>
              </div>
            </div>

            <!-- 例句部分 -->
            <div v-if="hasSentences" class="section">
              <h3 class="section-title">例句</h3>
              <ul class="sentence-list">
                <li v-for="(sentence, index) in word.sentences" :key="index" class="sentence-item">
                  <div class="sentence-en">{{ sentence.s_content }}</div>
                  <div class="sentence-cn">{{ sentence.s_cn }}</div>
                </li>
              </ul>
            </div>

            <!-- 空数据提示 -->
            <div v-if="isEmpty" class="empty-message">
              暂无更多单词信息
            </div>
          </div>
        </div>
      `,
        setup(props) {
            // 计算属性检查各部分是否有数据
            const hasTranslations = computed(() => props.word.translations && props.word.translations.length > 0);
            const hasPhrases = computed(() => props.word.phrases && props.word.phrases.length > 0);
            const hasRelWords = computed(() => props.word.relWords && props.word.relWords.length > 0);
            const hasSynonyms = computed(() => props.word.synonyms && props.word.synonyms.length > 0);
            const hasSentences = computed(() => props.word.sentences && props.word.sentences.length > 0);
            const isEmpty = computed(() => !hasTranslations.value && !hasPhrases.value && !hasRelWords.value && !hasSynonyms.value && !hasSentences.value);

            // 播放音频
            const playAudio = (audioUrl) => {
                const audio = new Audio(audioUrl);
                audio.play().catch(e => console.error("Audio playback failed:", e));
            };

            return {
                hasTranslations,
                hasPhrases,
                hasRelWords,
                hasSynonyms,
                hasSentences,
                isEmpty,
                playAudio
            };
        }
    };

    const app = createApp({
        components: {
            WordCard
        },
        data() {
            return {
                currentWord: {},
                words: [],
                timer: null,
                countdown: 0,
                updateInterval: 10 // 更新间隔(秒)
            };
        },
        methods: {
            loadWords() {
                const storedWords = window.utools.dbStorage.getItem("wordBook");
                if (storedWords) {
                    this.words = JSON.parse(storedWords);
                    if (this.words.length > 0) {
                        this.updateWord();
                    }
                }
            },

            startAutoUpdate() {
                // 先清除已有定时器
                if (this.timer) {
                    clearInterval(this.timer);
                }

                // 初始化倒计时
                this.countdown = this.updateInterval;

                // 设置定时器
                this.timer = setInterval(() => {
                    this.countdown--;

                    if (this.countdown <= 0) {
                        this.updateWord();
                        this.countdown = this.updateInterval;
                    }
                }, 1000);
            },

            updateWord() {
                if (this.words.length === 0) return;

                // 随机选择下一个单词
                const newIndex = Math.floor(Math.random() * this.words.length);
                this.currentWord = this.words[newIndex];
                this.countdown = 10;
            }
        },
        created() {
            this.loadWords();
            this.startAutoUpdate();
        },
        beforeUnmount() {
            // 组件销毁前清除定时器
            if (this.timer) {
                clearInterval(this.timer);
            }
        }
    });

    app.mount('#app');
</script>
</body>
</html>
